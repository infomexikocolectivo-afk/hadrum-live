<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a1208">
<title>Morning Glory III</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest-deep:   #0a1208;
    --forest:        #0f2011;
    --forest-mid:    #1a2f1c;
    --moss:          #2d4a2e;
    --cream:         #f5ead8;
    --cream-soft:    #e8dcc4;
    --gold-soft:     #d4b896;
    --gold-warm:     #c19247;
    --ember:         #7a3820;
    --shadow-deep:   rgba(0,0,0,0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: var(--forest-deep);
    font-family: 'Inter', sans-serif;
    color: var(--cream);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* Atmospheric grain + vignette on the whole app */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at center, transparent 70%, rgba(0,0,0,0.25) 100%);
  }
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    opacity: 0;
    mix-blend-mode: normal;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.18 0 0 0 0 0.12 0 0 0 0.25 0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
  }

  /* ========== SCREEN CONTAINER ========== */
  .screen {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: none;
    flex-direction: column;
    padding: max(env(safe-area-inset-top), 20px) 28px calc(max(env(safe-area-inset-bottom), 24px) + 28px);
    opacity: 0;
    transition: opacity 0.8s ease;
    overflow: hidden;
  }
  .screen.active {
    display: flex;
    opacity: 1;
    animation: screenIn 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }

  @keyframes screenIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ========== LOGO (firma arriba) ========== */
  .logo-sig {
    flex: 0 0 auto;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 4px 0 0;
    height: 56px;
  }
  .logo-sig img {
    height: 44px;
    width: auto;
    opacity: 0.85;
    filter: drop-shadow(0 0 12px rgba(212, 184, 150, 0.15));
  }

  /* ========== SCREEN 1 — LANGUAGE ========== */
  #screen-lang .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 48px;
    position: relative;
    z-index: 100;
    isolation: isolate;
  }
  .logo-hero {
    width: min(62vw, 240px);
    height: auto;
    animation: breathe 4.2s ease-in-out infinite;
    filter:
      drop-shadow(0 0 40px rgba(255, 200, 80, 0.55))
      drop-shadow(0 0 100px rgba(193, 146, 71, 0.35));
    position: relative;
    z-index: 200;
    isolation: isolate;
  }
  @keyframes breathe {
    0%, 100% { opacity: 1;    transform: scale(1); }
    50%      { opacity: 0.92; transform: scale(1.04); }
  }
  .lang-invitation {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 20px;
    color: var(--gold-soft);
    letter-spacing: 0.02em;
    text-align: center;
    opacity: 0.85;
  }
  .lang-choices {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 280px;
  }
  .lang-btn {
    background: transparent;
    border: 1px solid rgba(212, 184, 150, 0.35);
    color: var(--cream);
    padding: 16px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }
  .lang-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(120deg, transparent, rgba(193,146,71,0.15), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }
  .lang-btn:hover, .lang-btn:active {
    border-color: var(--gold-warm);
    color: var(--gold-soft);
  }
  .lang-btn:hover::before, .lang-btn:active::before {
    transform: translateX(100%);
  }
  .lang-event-preview {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    opacity: 0.6;
    animation: fadeInUp 1.2s ease 0.8s both;
  }
  .lang-event-preview .preview-date {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-soft);
    font-weight: 500;
  }
  .lang-event-preview .preview-price {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--cream-soft);
    letter-spacing: 0.04em;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 0.6; transform: translateY(0); }
  }

  /* ========== SHARED TYPE SYSTEM ========== */
  .kicker {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--gold-warm);
    font-weight: 500;
    text-align: center;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--cream);
    line-height: 1.02;
    letter-spacing: -0.012em;
    text-align: center;
    text-shadow: 0 2px 20px var(--shadow-deep);
  }
  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold-warm);
    opacity: 0.7;
    margin: 0 auto;
  }
  .sub {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--gold-soft);
    letter-spacing: 0.04em;
    text-align: center;
    line-height: 1.5;
  }
  .philosophy {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-soft);
    text-align: center;
    opacity: 0.7;
    line-height: 1.8;
  }


  /* ===== CIENCIA INTEGRADA EN TEASER ===== */
  .philo-inline {
    width: 100%;
    text-align: center;
  }
  .philo-body-inline {
    display: flex;
    flex-direction: column;
    gap: 6px;
    width: 100%;
    padding: 0 4px;
  }
  .philo-body-inline .benefit {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    text-align: left;
    animation: fadeUp 0.5s ease both;
  }
  .philo-body-inline .benefit-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    color: var(--gold-warm);
    min-width: 38px;
    text-align: right;
    line-height: 1.5;
    flex-shrink: 0;
  }
  .philo-body-inline .benefit-text {
    font-size: 11px;
    color: var(--gold-soft);
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  /* ========== CTA BUTTON ========== */
  .cta {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    background: transparent;
    border: 1px solid var(--gold-warm);
    color: var(--gold-soft);
    padding: 16px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.5s ease;
    position: relative;
    overflow: hidden;
    text-decoration: none;
    text-align: center;
  }
  .cta::before {
    content: "";
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(193,146,71,0.2), transparent);
    transition: left 0.8s ease;
  }
  .cta:hover, .cta:active {
    background: rgba(193,146,71,0.08);
    color: var(--cream);
    letter-spacing: 0.36em;
  }
  .cta:hover::before, .cta:active::before { left: 100%; }
  .cta-skip {
    display: block;
    width: 100%;
    max-width: 320px;
    margin: 0 auto;
    background: transparent;
    border: none;
    color: var(--gold-soft);
    padding: 10px 24px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    opacity: 0.55;
    transition: opacity 0.3s ease;
    text-align: center;
  }
  .cta-skip:hover, .cta-skip:active { opacity: 1; }

  .cta-primary {
    border-color: var(--gold-warm);
    background: linear-gradient(180deg, rgba(193,146,71,0.08), rgba(193,146,71,0.02));
    color: var(--cream);
  }

  /* Price badge on reserve screen */
  .price-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 1px solid rgba(193,146,71,0.4);
    padding: 10px 20px;
    margin-bottom: 4px;
  }
  .price-badge .price-amount {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: -0.01em;
  }
  .price-badge .price-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold-soft);
    font-weight: 500;
    line-height: 1.4;
  }

  /* ========== SCREEN 2 — TEASER ========== */
  #screen-teaser .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0 16px;
    width: 100%;
    min-height: 0;
  }
  #screen-teaser .top-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding-top: 8px;
    width: 100%;
  }
  #screen-teaser .headline {
    font-size: clamp(30px, 9vw, 46px);
  }

  /* Teaser image — editorial polaroid style */
  .teaser-img {
    width: min(78%, 300px);
    max-height: 32vh;
    margin: 4px 0 0;
    border-radius: 3px;
    overflow: hidden;
    position: relative;
    background: linear-gradient(135deg, #1a2f1c 0%, #0f2011 100%);
    box-shadow:
      0 2px 8px rgba(0, 0, 0, 0.5),
      0 12px 28px rgba(0, 0, 0, 0.55),
      0 24px 60px rgba(0, 0, 0, 0.45),
      0 0 0 1px rgba(193, 146, 71, 0.18),
      inset 0 0 40px rgba(0, 0, 0, 0.25);
    transform: rotate(-0.4deg);
    animation: teaserFloat 7s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 140px;
  }
  .teaser-img::after {
    /* inner vignette + warm glow */
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, transparent 55%, rgba(10, 18, 8, 0.35) 100%),
      linear-gradient(180deg, rgba(193, 146, 71, 0.05), transparent 40%);
    pointer-events: none;
    z-index: 2;
  }
  .teaser-img img {
    width: 100%;
    max-height: 32vh;
    height: auto;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 1.2s ease;
    filter: saturate(0.92) contrast(1.02);
  }
  .teaser-img img.loaded {
    opacity: 1;
  }
  @keyframes teaserFloat {
    0%, 100% { transform: rotate(-0.4deg) translateY(0); }
    50%      { transform: rotate(0.3deg) translateY(-3px); }
  }
  /* Shimmer animation on a word */
  .shimmer-word {
    position: relative;
    display: inline-block;
    background: linear-gradient(
      90deg,
      var(--cream) 0%,
      var(--cream) 35%,
      var(--gold-warm) 50%,
      var(--cream) 65%,
      var(--cream) 100%
    );
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 4.5s ease-in-out infinite;
  }
  @keyframes shimmer {
    0%, 100% { background-position: 200% 0; }
    50%      { background-position: -100% 0; }
  }
  #screen-teaser .mid-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  #screen-teaser .bottom-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
  }
  @keyframes benefitIn {
    to { opacity: 1; transform: translateX(0); }
  }

  /* ========== SCREEN 4 — PROGRAM ========== */
  #screen-program .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 8px 0 10px;
    min-height: 0;
  }
  #screen-program .top-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding-top: 8px;
  }
  .prog-headline {
    font-size: clamp(28px, 8vw, 40px);
    text-align: center;
    line-height: 1.05;
  }
  .prog-headline-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(18px, 5vw, 24px);
    color: var(--cream-soft);
    -webkit-text-fill-color: var(--cream-soft);
    background: none;
  }
  .prog-arc {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--gold-soft);
    text-align: center;
    opacity: 0.85;
    text-transform: uppercase;
    padding-top: 2px;
  }
  .prog-mid {
    display: flex;
    flex-direction: column;
    gap: 0;
    padding: 2px 4px;
    position: relative;
  }
  /* vertical timeline line */
  .prog-mid::before {
    content: "";
    position: absolute;
    left: 52px;
    top: 8px;
    bottom: 8px;
    width: 1px;
    background: linear-gradient(180deg, transparent, rgba(193,146,71,0.35) 15%, rgba(193,146,71,0.35) 85%, transparent);
  }
  .tl-row {
    display: grid;
    grid-template-columns: 52px 14px 1fr;
    align-items: center;
    gap: 0 8px;
    padding: 6px 0;
    opacity: 0;
    animation: benefitIn 0.5s ease-out forwards;
  }
  .tl-time {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--gold-warm);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-align: right;
    white-space: nowrap;
  }
  .tl-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--gold-warm);
    box-shadow: 0 0 6px rgba(193,146,71,0.5);
    justify-self: center;
    flex-shrink: 0;
  }
  .tl-dot.peak {
    width: 10px;
    height: 10px;
    box-shadow: 0 0 12px rgba(193,146,71,0.8);
  }
  .tl-content { display: flex; flex-direction: column; gap: 1px; }
  .tl-label {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream);
  }
  .tl-desc {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: var(--gold-soft);
    letter-spacing: 0.01em;
    font-weight: 300;
    line-height: 1.3;
  }
  .wellness-bar {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    color: var(--gold-soft);
    letter-spacing: 0.08em;
    text-align: center;
    opacity: 0.8;
    border-top: 1px solid rgba(193,146,71,0.2);
    padding-top: 8px;
    line-height: 1.5;
  }

  /* ========== SCREEN 6 — RESERVE ========== */
  #screen-reserve .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 12px 0 12px;
    min-height: 0;
  }
  #screen-reserve .top-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding-top: 12px;
  }
  /* The descending counter number */
  .counter-display {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: clamp(72px, 24vw, 128px);
    line-height: 0.9;
    color: var(--cream);
    text-shadow: 0 2px 24px var(--shadow-deep), 0 0 40px rgba(193,146,71,0.12);
    position: relative;
    display: inline-block;
    letter-spacing: -0.02em;
  }
  .counter-number {
    display: inline-block;
    min-width: 1.5em;
    text-align: center;
    position: relative;
  }
  .counter-flash {
    animation: numFlash 0.5s ease-out;
  }
  @keyframes numFlash {
    0%   { color: var(--gold-warm); transform: scale(1.05); opacity: 0.6; }
    100% { color: var(--cream); transform: scale(1); opacity: 1; }
  }
  .counter-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--gold-soft);
    font-weight: 400;
    text-align: center;
    opacity: 0.85;
  }

  #screen-reserve .mid-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 4px;
    text-align: center;
  }
  .detail-line {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--cream-soft);
    letter-spacing: 0.02em;
    line-height: 1.55;
    font-weight: 300;
  }
  .detail-strong {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--cream);
    letter-spacing: 0.06em;
    font-weight: 500;
    text-transform: uppercase;
  }
  .scarcity-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    width: 100%;
    padding: 10px 0;
  }
  .scarcity-bar .bar-line {
    flex: 1;
    max-width: 36px;
    height: 1px;
    background: var(--gold-warm);
    opacity: 0.6;
  }
  .scarcity-bar .bar-text {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold-warm);
    font-weight: 500;
  }
  .reserve-closing {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--gold-soft);
    text-align: center;
    line-height: 1.5;
    padding: 0 8px;
    opacity: 0.9;
  }

  #screen-reserve .bottom-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .micro-copy {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: var(--gold-soft);
    opacity: 0.55;
    text-align: center;
    text-transform: uppercase;
  }

  /* ========== PROGRESS DOTS ========== */
  .progress {
    position: fixed;
    top: calc(max(env(safe-area-inset-top), 20px) + 14px);
    right: 28px;
    display: flex;
    gap: 5px;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.4s ease;
  }
  .progress.visible { opacity: 1; }
  .progress .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(212, 184, 150, 0.25);
    transition: all 0.4s ease;
  }
  .progress .dot.active {
    background: var(--gold-warm);
    box-shadow: 0 0 6px rgba(193, 146, 71, 0.6);
  }
  .progress .dot.done {
    background: rgba(212, 184, 150, 0.55);
  }

  /* ========== BACK ARROW ========== */
  .back-btn {
    position: fixed;
    top: calc(max(env(safe-area-inset-top), 20px) + 10px);
    left: 24px;
    z-index: 50;
    background: none;
    border: none;
    color: var(--gold-soft);
    font-size: 18px;
    cursor: pointer;
    padding: 8px;
    opacity: 0;
    transition: opacity 0.4s ease;
    font-family: 'Cormorant Garamond', serif;
  }
  .back-btn.visible { opacity: 0.6; }
  .back-btn:hover, .back-btn:active { opacity: 1; }

  /* ========== SMALL HEIGHT SAFETY ========== */
  @media (max-height: 760px) {
    #screen-teaser .headline { font-size: 38px; }
    .teaser-img { width: min(70%, 260px); }
    .philo-body-inline .benefit { padding: 4px 0; }
    .philo-body-inline .benefit-num { font-size: 15px; }
    .philo-body-inline .benefit-text { font-size: 10.5px; }
  }
  @media (max-height: 700px) {
    #screen-teaser .headline { font-size: 34px; }
    .counter-display { font-size: 88px; }
    .detail-line { font-size: 12px; }
    .teaser-img { width: min(58%, 220px); }
    #screen-teaser .top-block { gap: 14px; padding-top: 10px; }
    .philo-body-inline { gap: 4px; }
    .philo-body-inline .benefit-num { font-size: 14px; min-width: 34px; }
    .philo-body-inline .benefit-text { font-size: 10px; line-height: 1.35; }
  }
  @media (max-height: 620px) {
    .logo-sig { height: 44px; }
    .logo-sig img { height: 34px; }
    #screen-teaser .headline { font-size: 28px; }
    .counter-display { font-size: 74px; }
    .screen { padding-top: 14px; padding-bottom: 16px; }
    .teaser-img { width: min(48%, 180px); }
    .philo-body-inline .benefit-num { font-size: 13px; min-width: 30px; }
    .philo-body-inline .benefit-text { font-size: 9.5px; line-height: 1.3; }
  }

  /* larger screens: contain the layout so it still feels mobile */
  @media (min-width: 560px) {
    .screen {
      max-width: 480px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 120px rgba(0,0,0,0.6);
      border-left: 1px solid rgba(193,146,71,0.06);
      border-right: 1px solid rgba(193,146,71,0.06);
    }
    body {
      background:
        radial-gradient(ellipse at 50% 40%, #0d180c 0%, #050a04 100%);
    }
    /* progress dots: align to right edge of the 480px column */
    .progress {
      right: auto;
      left: calc(50% + 240px - 48px);
    }
    /* back button: align to left edge of the 480px column */
    .back-btn {
      left: calc(50% - 240px + 16px);
    }
  }
</style>
</head>

      programArc: 'Del suelo al éxtasis — y de regreso.',
      timeline: [

      ],
      wellness: 'Cacao ceremonial · Jugos frescos · Agua infusionada · Frutas de temporada'
    }
  };

  // ========== LANGUAGE APPLICATION ==========
  function applyLanguage(lang) {
    STATE.lang = lang;
    document.documentElement.lang = lang;

    // Update price label per language
    const priceLabel = document.querySelector('.price-badge .price-label');
    if (priceLabel) {
      priceLabel.innerHTML = lang === 'en'
        ? '≈ $18 USD<br>per person'
        : '≈ $18 USD<br>por persona';
    }

    // Swap all elements with data-en / data-es
    document.querySelectorAll('[data-en]').forEach(el => {
      const val = el.getAttribute('data-' + lang);
      if (val) el.innerHTML = val;
    });

    // Inject headlines (these have embedded spans)
    document.getElementById('teaser-headline').innerHTML = COPY[lang].teaserHeadline;

    // Build program screen
    const c = COPY[lang];
    document.getElementById('prog-sub').textContent = c.programHeadlineSub;
    document.getElementById('prog-arc').textContent = c.programArc;

    const tl = document.getElementById('prog-timeline');
    tl.innerHTML = '';
    c.timeline.forEach((item, i) => {
      const row = document.createElement('div');
      row.className = 'tl-row';
      row.style.animationDelay = (i * 60) + 'ms';
      const isPeak = item.label === 'PEAK' || item.label === 'PICO';
      row.innerHTML = `
        <div class="tl-time">${item.time}</div>
        <div class="tl-dot${isPeak ? ' peak' : ''}"></div>
        <div class="tl-content">
          <div class="tl-label">${item.label}</div>
          <div class="tl-desc">${item.desc}</div>
        </div>`;
      tl.appendChild(row);
    });
    document.getElementById('prog-wellness').textContent = c.wellness;

    // Build philo body (inline in teaser)
    const body = document.getElementById('philo-body-inline');
    if (body) {
      body.innerHTML = '';
      COPY[lang].philoBody.forEach((line, i) => {
        const div = document.createElement('div');
        div.className = line.class;
        if (line.num !== undefined) {
          div.style.animationDelay = (i * 70) + 'ms';
          div.innerHTML = `<span class="benefit-num">${line.num}</span><span class="benefit-text">${line.text}</span>`;
        } else {
          div.innerHTML = line.text;
        }
        body.appendChild(div);
      });
    }
  }

  // ========== SCREEN NAVIGATION ==========
  function goTo(screenId) {
    const current = document.querySelector('.screen.active');
    const target = document.getElementById(screenId);
    if (!target || current === target) return;

    current.classList.remove('active');
    // Brief delay for smoother transition
    setTimeout(() => {
      target.classList.add('active');

      // Update step
      STATE.currentStep = SCREENS.indexOf(screenId);

      // Update progress + back visibility
      updateProgress();

      // Trigger screen-specific animations
      if (screenId === 'screen-reserve') {
        startCounterAnimation();
      } else {
        stopCounterAnimation();
      }

      // Scroll lock reset (mobile safari)
      window.scrollTo(0, 0);
    }, 80);
  }

  function updateProgress() {
    const progress = document.getElementById('progress');
    const backBtn = document.getElementById('backBtn');

    // Progress shows on screens 1-3 (steps 1, 2, 3)
    if (STATE.currentStep >= 1) {
      progress.classList.add('visible');
      backBtn.classList.add('visible');
    } else {
      progress.classList.remove('visible');
      backBtn.classList.remove('visible');
    }

    document.querySelectorAll('.progress .dot').forEach(dot => {
      const step = parseInt(dot.dataset.step);
      dot.classList.remove('active', 'done');
      if (step < STATE.currentStep) dot.classList.add('done');
      else if (step === STATE.currentStep) dot.classList.add('active');
    });
  }

  // ========== COUNTER ANIMATION (screen 4) ==========
  let counterInterval = null;
  function startCounterAnimation() {
    stopCounterAnimation();
    const el = document.getElementById('counter');
    let n = 33;
    const MIN = 7;
    const STEP_MS = 180;
    const PAUSE_AT_END = 2400;

    function tick() {
      el.textContent = n;
      el.classList.remove('counter-flash');
      void el.offsetWidth; // reflow to restart animation
      el.classList.add('counter-flash');

      if (n > MIN) {
        n--;
        counterInterval = setTimeout(tick, STEP_MS);
      } else {
        // Pause at 7, then reset to 33
        counterInterval = setTimeout(() => {
          n = 33;
          tick();
        }, PAUSE_AT_END);
      }
    }
    tick();
  }
  function stopCounterAnimation() {
    if (counterInterval) {
      clearTimeout(counterInterval);
      counterInterval = null;
    }
  }

  // ========== EVENT BINDINGS ==========
  function init() {
    // Language buttons
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const lang = btn.dataset.lang;
        applyLanguage(lang);
        goTo('screen-teaser');
      });
    });

    // CTA buttons with data-next (both .cta and .cta-skip)
    document.querySelectorAll('[data-next]').forEach(btn => {
      btn.addEventListener('click', () => {
        goTo(btn.dataset.next);
      });
    });

    // Back button
    document.getElementById('backBtn').addEventListener('click', () => {
      if (STATE.currentStep > 0) {
        goTo(SCREENS[STATE.currentStep - 1]);
      }
    });

    // Prevent pull-to-refresh and rubber-banding on mobile
    document.body.addEventListener('touchmove', (e) => {
      if (e.touches.length === 1) e.preventDefault();
    }, { passive: false });

    // Initial language apply (default en) so placeholders fill
    applyLanguage('en');
    updateProgress();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
